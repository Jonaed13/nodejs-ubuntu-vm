version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-ubuntu-vm
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - NODE_ENV=production
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
